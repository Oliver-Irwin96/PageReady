# PageReady — Netlify configuration
# Security headers applied to all pages

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking — stops your pages being embedded in iframes on other sites
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing — browsers must use the declared content type
    X-Content-Type-Options = "nosniff"

    # Control how much referrer info is sent when following links
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable unused browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"

    # Content Security Policy
    # Covers: Google Fonts, Unsplash images, inline scripts/styles used in the site
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com data: blob:; connect-src 'self'; frame-ancestors 'none';"
